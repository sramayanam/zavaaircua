# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: zava-air-complaints

services:
  web:
    project: .
    language: js
    host: containerapp
    docker:
      path: ./Dockerfile

  cua:
    project: cua
    language: python
    host: containerapp
    docker:
      path: Dockerfile
    # NOTE: The CUA app targets an existing Container App environment in a
    # different subscription (32e739cb / rg-complaints). Deploy it separately:
    #   az deployment group create \
    #     --subscription 32e739cb-7b23-4259-a180-e1e0e69b974d \
    #     --resource-group rg-complaints \
    #     --template-file infra/cua-containerapp.bicep \
    #     --parameters cuaImage=<acr>.azurecr.io/cua-lunarair:<tag> ...
    # azd will still build and push the Docker image to ACR via `azd deploy cua`.
